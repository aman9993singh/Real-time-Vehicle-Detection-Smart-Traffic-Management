<!DOCTYPE html>
<html>
<head>
    <title>Upload Lanes - ITMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">
    <div class="container py-5">
        <h2 class="mb-4">Please upload lane videos</h2>
        <form action="/upload" method="POST" enctype="multipart/form-data">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Lane 1 Video:</label>
                    <input type="file" name="lane1" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label>Lane 2 Video:</label>
                    <input type="file" name="lane2" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label>Lane 3 Video:</label>
                    <input type="file" name="lane3" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label>Lane 4 Video:</label>
                    <input type="file" name="lane4" class="form-control">
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-lg mt-3">Upload and Start</button>
        </form>
    </div>
</body>
</html>
