<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - ITMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #6610f2, #fd7e14); height: 100vh; display: flex; align-items: center; position: relative; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1; }
        
        /* Bottom Right Credits Styling */
        .credits {
            position: absolute;
            bottom: 20px;
            right: 30px;
            text-align: right;
            color: rgba(255, 255, 255, 0.9);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.4;
            pointer-events: none;
        }
        .credits b { font-size: 1.1rem; color: #fff; }
        .credits p { margin: 0; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 login-card">
                <h2 class="text-center mb-4">Real Time Vehicle Detection & Smart Traffic Management</h2>
                <form action="/login" method="POST">
                    <div class="mb-3">
                        <input type="text" name="username" class="form-control" placeholder="Admin Username" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" name="password" class="form-control" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Admin Login</button>
                </form>
            </div>
        </div>
    </div>

    <div class="credits">
        <p>Developed By -</p>
        <b>Aman Singh</b>
        <p>A023144825024</p>
        <p>M. Tech AI (2025-2027)</p>
    </div>
</body>
</html>
